name: Run News Bot Once

on:
  schedule:
    # HKT 09:00-23:30 every 30 minutes, plus HKT 00:00 (UTC-based cron)
    - cron: "0,30 1-15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Why this run was triggered"
        required: false
        default: "manual"
      trigger_time:
        description: "Trigger time from Worker"
        required: false

concurrency:
  group: newsbot-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Opt into Node.js 24 for JavaScript actions to avoid Node 20 deprecation issues
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Runner diagnostics
        run: |
          echo "--- Environment ---"
          uname -a || true
          echo "--- Node/npm ---"
          node --version || true
          npm --version || true
          echo "--- Python ---"
          python --version || true
          python -c "import sys; print(sys.executable)" || true
          echo "--- pip freeze ---"
          python -m pip freeze || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium undetected-chromedriver setuptools

      - name: Run one fetch cycle
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python - << 'PY'
          import newsbot
          ok = newsbot.get_coindesk_hot_news(is_morning_summary=False, force_alert=True)
          print(f"run result: {ok}")
          PY
