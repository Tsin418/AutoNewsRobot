name: Run News Bot Once

on:
  schedule:
    # HKT 09:00-23:30 every 30 minutes, plus HKT 00:00 (UTC-based cron)
    - cron: "0,30 1-15 * * *"
    - cron: "0 16 * * *"

concurrency:
  group: newsbot-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Opt into Node.js 24 for JavaScript actions to avoid Node 20 deprecation issues
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one fetch cycle
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          FEISHU_WEBHOOK: ${https://open.feishu.cn/open-apis/bot/v2/hook/730fd294-c270-4e81-b94d-6c6768d9112d}
          FEISHU_SECRET: ${2JdFHxHgRvsiICu8fZX3Lh}
        run: |
          python newsbot.py
